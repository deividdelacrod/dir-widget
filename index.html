<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistente Cliente DIRI</title>
  <script src="https://sdk.amazonaws.com/js/amazon-connect-streams.js"></script>
  <style>
    body { font-family: Arial; margin: 10px; }
    #ccpContainer { display: none; } /* Ocultamos CCP embebido */
    #appContainer { margin-top: 10px; }
    .field { margin: 6px 0; }
    .label { font-weight: bold; }
  </style>
</head>
<body>

  <!-- 1) Div oculto para inicializar CCP internamente -->
  <div id="ccpContainer"></div>

  <!-- 2) Aquí desplegamos nuestra UI -->
  <div id="appContainer">
    <h2>Información del Cliente</h2>
    <div id="status">Esperando llamada…</div>
    <div id="info" style="display:none">
      <div class="field"><span class="label">Número digitado:</span> <span id="numeroDigitado"></span></div>
      <div class="field"><span class="label">VIP:</span>            <span id="vip"></span></div>
      <div class="field"><span class="label">Oferta:</span>         <span id="oferta"></span></div>
      <div class="field"><span class="label">Tipo:</span>           <span id="tipo"></span></div>
      <div class="field"><span class="label">Estatus DN:</span>     <span id="estatusdn"></span></div>
      <div class="field"><span class="label">Portabilidad:</span>    <span id="portabilidad"></span></div>
      <div class="field"><span class="label">Marca:</span>          <span id="marca"></span></div>
      <div class="field"><span class="label">Confiable:</span>      <span id="confiable"></span></div>
      <div class="field"><span class="label">Recargas 30d:</span>    <span id="recargas"></span></div>
      <div class="field"><span class="label">Días Activación:</span><span id="dias"></span></div>
    </div>
  </div>

  <script>
    const instanceUrl = "https://diri.awsapps.com/connect";

    // 3) Inicializamos internamente un CCP oculto para poder recibir eventos de contacto
    connect.core.initCCP(document.getElementById("ccpContainer"), {
      ccpUrl: instanceUrl + "/ccp-v2/",
      loginPopup: true,
      softphone: { allowFramedSoftphone: true }
    });

    // 4) Una vez cargado el CCP, nos suscribimos a eventos de contacto
    connect.contact(contact => {
      console.info("📞 Contacto conectado");
      document.getElementById("status").textContent = "Llamada en curso…";

      // onRefresh se dispara cuando actualizan los atributos
      contact.onRefresh(() => {
        contact.getAttributes(attrs => {
          // si no llegó aún el número digitado, salimos
          if (!attrs.numeroDigitado) return;

          // Pintamos cada campo
          document.getElementById("numeroDigitado").textContent     = attrs.numeroDigitado.value;
          document.getElementById("vip").textContent               = attrs.vip.value;
          document.getElementById("oferta").textContent            = attrs.ofertacontratada.value;
          document.getElementById("tipo").textContent              = attrs.tipo.value;
          document.getElementById("estatusdn").textContent         = attrs.estatusdn.value;
          document.getElementById("portabilidad").textContent      = attrs.estatusportabilidad.value;
          document.getElementById("marca").textContent             = attrs.nombremarca.value;
          document.getElementById("confiable").textContent         = attrs.clienteConfiable.value;
          document.getElementById("recargas").textContent          = attrs.recargas30dias_total.value;
          document.getElementById("dias").textContent              = attrs.diasDesdeActivacion.value;

          document.getElementById("info").style.display = "block";
        });
      });

      contact.onEnded(() => {
        console.info("📴 Llamada finalizada");
        document.getElementById("status").textContent = "Llamada finalizada.";
      });
    });
  </script>

</body>
</html>
