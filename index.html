<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Asistente DIRI (V2)</title>
  <script src="https://sdk.amazonaws.com/js/amazon-connect-streams.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    .info-box { background: #fff; padding: 15px; border: 1px solid #ccc; }
    input, button { margin-top: 10px; width: 100%; padding: 8px; }
    input:disabled, button:disabled { background: #ddd; }
  </style>
</head>
<body>
  <div class="info-box">
    <h2>Asistente de Cliente DIRI</h2>
    <p><b>Número digitado:</b> <span id="numeroCliente">Esperando contacto…</span></p>
    <label for="query">Pregunta:</label>
    <input type="text" id="query" placeholder="Ej. ¿Qué plan tiene este cliente?" disabled />
    <button id="consultar" disabled>Consultar</button>
    <h3>Datos del Cliente</h3>
    <pre id="resultado">—</pre>
  </div>

  <script>
    let numero = "";

    // 1) Suscríbete al contacto activo
    connect.contact(contact => {
      // 2) Lee atributos una vez que el contacto esté full conectado
      contact.onConnected(() => {
        const attrs = contact.getAttributes();
        numero = attrs["phone_number"]?.value || "";
        document.getElementById("numeroCliente").textContent = numero || "No detectado";

        // 3) Habilita el formulario
        document.getElementById("query").disabled = !numero;
        document.getElementById("consultar").disabled = !numero;
      });
    });

    // 4) Envía la consulta a tu API Gateway / Lambda
    document.getElementById("consultar").addEventListener("click", async () => {
      const pregunta = document.getElementById("query").value.trim();
      if (!numero || !pregunta) {
        alert("Debes tener un número y una pregunta.");
        return;
      }
      try {
        const res = await fetch("https://qtk0hxnytk.execute-api.us-east-1.amazonaws.com/Prod/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone_number: numero, pregunta })
        });
        const data = await res.json();
        document.getElementById("resultado").textContent = `
Marca: ${data.nombremarca}
Plan: ${data.ofertacontratada}
Tipo: ${data.tipo}
VIP: ${data.vip}
Estatus DN: ${data.estatusdn}
Portabilidad: ${data.estatusportabilidad}
Cliente Confiable: ${data.clienteConfiable}
Recargas últimos 30 días: ${data.recargas30dias_total}
Días desde activación: ${data.diasDesdeActivacion}
        `.trim();
      } catch (err) {
        console.error(err);
        document.getElementById("resultado").textContent = "Error al consultar la API.";
      }
    });
  </script>
</body>
</html>
